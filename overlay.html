<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Overlay Mosseba</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Audiowide&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: transparent;
  font-family: "Orbitron", sans-serif;
}

.overlay {
  width: 1920px;
  height: 1080px;
  position: relative;
}

/* TITLE */
.title {
  position: absolute;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  padding: 15px 40px;
  border-radius: 50px;
  background: rgba(0,0,0,0.6);
  border: 1px solid #ff00ff;
  box-shadow: 0 0 20px #ff00ff, 0 0 40px #00f0ff33;
  text-align: center;
}

.title h1 {
  margin: 0;
  font-family: "Audiowide";
  font-size: 36px;
  letter-spacing: 6px;
  color: white;
  text-shadow: 0 0 10px #ff00ff, 0 0 20px #00f0ff;
}

/* BLINDTEST FRAME */
.blindtest {
  position: absolute;
  left: 34px;
  top: 120px;
  width: 1450px;
  height: 840px;
  border-radius: 20px;
  border: 2px solid #00f0ff;
  box-shadow: 0 0 20px #00f0ff, 0 0 40px #ff00ff33;
  overflow: hidden;
}

/* CHAT FRAME */
.chat {
  position: absolute;
  right: 34px;
  top: 120px;
  width: 400px;
  height: 840px;
  border-radius: 20px;
  border: 2px solid #ff00ff;
  box-shadow: 0 0 20px #ff00ff, 0 0 40px #00f0ff33;
  overflow: hidden;
}

/* TWITCH CHAT */
.chat iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* FOOTER */
.footer {
  position: absolute;
  left: 34px;
  right: 34px;
  bottom: 34px;
  height: 70px;
  border-radius: 15px;
  background: rgba(0,0,0,0.5);
  border: 1px solid #00f0ff;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 30px;
  color: white;
}

.footer span {
  color: #00f0ff;
}

/* BACKGROUND FX */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, #ff00ff22, transparent 40%),
              radial-gradient(circle, #00f0ff22, transparent 40%);
  animation: moveBg 12s linear infinite;
  z-index: -1;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(-20%,10%); }
  100% { transform: translate(0,0); }
}
</style>
</head>

<body>

<div class="overlay">

  <div class="title">
    <h1>BLINDTEST MOSSEBA</h1>
  </div>

  <!-- BLINDTEST ZONE -->
  <div class="blindtest"></div>

  <!-- CHAT TWITCH INTÉGRÉ -->
  <div class="chat">
    <iframe
      src="https://www.twitch.tv/embed/eterzx/chat?parent=etezx.github.io&darkpopout=true"
    ></iframe>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span>● LIVE BLINDTEST</span>
    <span>● MOSSEBA PARTY</span>
    <span>● CYBER EDITION</span>
  </div>

</div>

</body>
</html>
