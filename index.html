<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Blindtest Mosseba</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Audiowide&display=swap" rel="stylesheet">

<style>
body { margin:0; background:black; font-family:Orbitron; color:white; }

.title {
  text-align:center;
  font-size:40px;
  margin:20px;
  text-shadow:0 0 10px #ff00ff,0 0 30px #00f0ff;
}

.main {
  display:flex;
  justify-content:center;
  gap:40px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(10,60px);
  gap:10px;
}

.cell {
  width:60px;height:60px;
  display:flex;align-items:center;justify-content:center;
  border:1px solid #00f0ff;
  cursor:pointer;
}

#cyber-player {
  position:fixed;
  right:20px;
  bottom:20px;
  width:420px;
  height:260px;
  background:#000;
  border:1px solid #00f0ff;
  border-radius:16px;
}

.controls {
  position:absolute;
  bottom:10px;
  left:0;right:0;
  display:flex;
  justify-content:center;
  gap:10px;
}

#progressBar {
  position:absolute;
  bottom:60px;
  left:20px;
  width:calc(100% - 40px);
}

#cyber-timer {
  position:fixed;
  right:20px;
  bottom:300px;
  background:#000;
  padding:20px;
  display:none;
}

.admin-fab { position:fixed; bottom:20px; left:20px; }
.reprises-fab { left:120px; }
</style>
</head>

<body>

<h1 class="title">BLINDTEST MOSSEBA</h1>

<div class="main">
  <div class="grid" id="grid"></div>
</div>

<div id="cyber-player">
  <input id="progressBar" type="range" min="0" max="100" value="0">
  <div class="controls">
    <button id="playBtn">▶</button>
    <button id="pauseBtn">⏸</button>
    <input id="vol" type="range" min="0" max="1" step="0.01" value="0.5">
  </div>
</div>

<div id="cyber-timer">
  <span id="timerValue">30</span>
</div>

<button id="reprisesFab" class="admin-fab reprises-fab">REPRISES</button>

<div id="reprisesOverlay" style="display:none;">
  <div id="reprisesList"></div>
</div>

<script src="https://sdk.scdn.co/spotify-player.js"></script>

<script>

/* ========= CONFIG ========= */
const CLIENT_ID = "693a8fbd0d764e75a83d6060fde123f9";

/* ========= ELEMENTS ========= */
const grid = document.getElementById("grid");
const playBtn = document.getElementById("playBtn");
const pauseBtn = document.getElementById("pauseBtn");
const volumeInput = document.getElementById("vol");
const progressBar = document.getElementById("progressBar");

const reprisesFab = document.getElementById("reprisesFab");
const reprisesOverlay = document.getElementById("reprisesOverlay");
const reprisesList = document.getElementById("reprisesList");

const timerValue = document.getElementById("timerValue");
const timerBox = document.getElementById("cyber-timer");

/* ========= AUDIO LOCAL ========= */
const localAudio = new Audio();
let currentPlaybackMode = "none";

/* ========= LIBRARY ========= */
const REPRISES_LIBRARY = [
  { title:"Chop Suey", file:"./Chop_suey.mp3" },
  { title:"Its Raining Men", file:"./Its_raining_men.mp3" },
  { title:"Lady Mojo", file:"./Lady_mojo.mp3" },
  { title:"Beat It", file:"./beat_it.mp3" }
];

/* ========= GRID ========= */
for(let i=1;i<=100;i++){
  const cell=document.createElement("div");
  cell.className="cell";
  cell.textContent=i;
  cell.onclick=()=>playRandomReprise();
  grid.appendChild(cell);
}

/* ========= TIMER ========= */
let interval=null;
function startTimer(){
  let t=30;
  timerBox.style.display="block";
  timerValue.textContent=t;
  clearInterval(interval);
  interval=setInterval(()=>{
    t--;
    timerValue.textContent=t;
    if(t<=0){
      clearInterval(interval);
      pauseCurrent();
    }
  },1000);
}

/* ========= PLAYER CONTROL ========= */
async function pauseCurrent(){
  if(currentPlaybackMode==="local"){
    localAudio.pause();
  }
}

async function playCurrent(){
  if(currentPlaybackMode==="local"){
    localAudio.play();
  }
}

/* ========= PROGRESS BAR ========= */
localAudio.addEventListener("timeupdate",()=>{
  if(!localAudio.duration) return;
  progressBar.value=(localAudio.currentTime/localAudio.duration)*100;
});

progressBar.addEventListener("input",()=>{
  if(!localAudio.duration) return;
  localAudio.currentTime=(progressBar.value/100)*localAudio.duration;
});

localAudio.addEventListener("ended",()=>{
  progressBar.value=0;
});

/* ========= REPRISES ========= */
reprisesFab.onclick=()=>{
  reprisesOverlay.style.display="block";
  reprisesList.innerHTML="";
  REPRISES_LIBRARY.forEach(item=>{
    const btn=document.createElement("button");
    btn.textContent=item.title;
    btn.onclick=()=>playReprise(item);
    reprisesList.appendChild(btn);
  });
};

function playReprise(item){
  currentPlaybackMode="local";
  localAudio.src=item.file;
  localAudio.volume=volumeInput.value;
  progressBar.value=0;
  localAudio.play();
  startTimer();
}

/* ========= RANDOM ========= */
function playRandomReprise(){
  const r=REPRISES_LIBRARY[Math.floor(Math.random()*REPRISES_LIBRARY.length)];
  playReprise(r);
}

/* ========= CONTROLS ========= */
playBtn.onclick=playCurrent;
pauseBtn.onclick=pauseCurrent;

volumeInput.oninput=()=>{
  localAudio.volume=volumeInput.value;
};

</script>

</body>
</html>
